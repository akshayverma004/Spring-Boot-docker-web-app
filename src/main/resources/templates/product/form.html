<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${product.id} ? 'Edit Product' : 'Create Product'">Product Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .navbar {
            background-color: #007bff;
        }
        .form-container {
            background-color: white;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            padding: 30px;
            margin-top: 30px;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }
        .form-title {
            margin-bottom: 30px;
            color: #333;
        }
        .btn-group-custom {
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/products">Product CRUD</a>
        </div>
    </nav>

    <!-- Form Container -->
    <div class="form-container">
        <h2 class="form-title" th:text="${product.id} ? 'Edit Product' : 'Create New Product'"></h2>

        <!-- Edit Form -->
        <form th:if="${product.id}" th:action="@{/products/update/{id}(id=${product.id})}" method="post" th:object="${product}">
            <div class="mb-3">
                <label for="name" class="form-label">Product Name *</label>
                <input type="text" class="form-control" id="name" th:field="*{name}" required>
            </div>

            <div class="mb-3">
                <label for="description" class="form-label">Description</label>
                <textarea class="form-control" id="description" th:field="*{description}" rows="3"></textarea>
            </div>

            <div class="mb-3">
                <label for="category" class="form-label">Category</label>
                <input type="text" class="form-control" id="category" th:field="*{category}">
            </div>

            <div class="mb-3">
                <label for="price" class="form-label">Price *</label>
                <input type="number" class="form-control" id="price" th:field="*{price}" step="0.01" required>
            </div>

            <div class="mb-3">
                <label for="quantity" class="form-label">Quantity</label>
                <input type="number" class="form-control" id="quantity" th:field="*{quantity}">
            </div>

            <div class="btn-group-custom">
                <button type="submit" class="btn btn-primary">Update Product</button>
                <a href="/products" class="btn btn-secondary">Cancel</a>
            </div>
        </form>

        <!-- Create Form -->
        <form th:unless="${product.id}" action="/products/save" method="post" th:object="${product}">
            <div class="mb-3">
                <label for="name" class="form-label">Product Name *</label>
                <input type="text" class="form-control" id="name" th:field="*{name}" required>
            </div>

            <div class="mb-3">
                <label for="description" class="form-label">Description</label>
                <textarea class="form-control" id="description" th:field="*{description}" rows="3"></textarea>
            </div>

            <div class="mb-3">
                <label for="category" class="form-label">Category</label>
                <input type="text" class="form-control" id="category" th:field="*{category}">
            </div>

            <div class="mb-3">
                <label for="price" class="form-label">Price *</label>
                <input type="number" class="form-control" id="price" th:field="*{price}" step="0.01" required>
            </div>

            <div class="mb-3">
                <label for="quantity" class="form-label">Quantity</label>
                <input type="number" class="form-control" id="quantity" th:field="*{quantity}">
            </div>

            <div class="btn-group-custom">
                <button type="submit" class="btn btn-success">Create Product</button>
                <a href="/products" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
