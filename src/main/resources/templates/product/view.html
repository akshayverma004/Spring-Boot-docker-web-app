<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .navbar {
            background-color: #007bff;
        }
        .detail-container {
            background-color: white;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            padding: 30px;
            margin-top: 30px;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }
        .detail-row {
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #dee2e6;
        }
        .detail-label {
            font-weight: bold;
            color: #495057;
        }
        .detail-value {
            color: #212529;
            font-size: 16px;
        }
        .btn-group-custom {
            margin-top: 30px;
        }
    </style>
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/products">Product CRUD</a>
        </div>
    </nav>

    <!-- Detail Container -->
    <div class="detail-container">
        <h2 class="mb-4">Product Details</h2>

        <div class="detail-row">
            <div class="detail-label">Product ID:</div>
            <div class="detail-value" th:text="${product.id}"></div>
        </div>

        <div class="detail-row">
            <div class="detail-label">Name:</div>
            <div class="detail-value" th:text="${product.name}"></div>
        </div>

        <div class="detail-row">
            <div class="detail-label">Category:</div>
            <div class="detail-value" th:text="${product.category}"></div>
        </div>

        <div class="detail-row">
            <div class="detail-label">Price:</div>
            <div class="detail-value" th:text="'$' + ${#numbers.formatDecimal(product.price, 1, 2)}"></div>
        </div>

        <div class="detail-row">
            <div class="detail-label">Quantity:</div>
            <div class="detail-value" th:text="${product.quantity}"></div>
        </div>

        <div class="detail-row">
            <div class="detail-label">Description:</div>
            <div class="detail-value" th:text="${product.description ?: 'N/A'}"></div>
        </div>

        <div class="btn-group-custom">
            <a th:href="@{/products/edit/{id}(id=${product.id})}" class="btn btn-warning">Edit</a>
            <a th:href="@{/products/delete/{id}(id=${product.id})}" class="btn btn-danger" 
               onclick="return confirm('Are you sure?')">Delete</a>
            <a href="/products" class="btn btn-secondary">Back to List</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
